name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: jstrieb/github-stats@master
        with:
          username: faisal-kursheedali
          exclude_repos: ""
          exclude_langs: ""
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Commit updated SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg || true
          git diff --staged --quiet || git commit -m "chore: update GitHub stats SVGs"
          git push
